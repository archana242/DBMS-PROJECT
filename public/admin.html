<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Parking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="left-panel">
            <header class="app-header">
                <h1>Admin Dashboard</h1>
                <p>Parking System Management</p>
            </header>

            <section class="control-box">
                <h2>Welcome, <span id="admin-name">Admin</span></h2>
                <p class="info-text">You are logged in as an administrator. You have full access to all system data.</p>
                <button id="logout-btn" class="btn btn-danger">Log Out</button>
            </section>
            
        </aside>

        <main class="right-panel">
            <div class="admin-table-container">
                <h2>Full Vehicle History</h2>
                <div class="table-wrapper">
                    <table id="vehicle-history-table">
                        <thead>
                            <tr>
                                <th>Vehicle ID</th>
                                <th>License Plate</th>
                                <th>Owner ID</th>
                                <th>Spot</th>
                                <th>Level</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                            </tr>
                        </thead>
                        <tbody id="vehicle-history-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="admin-table-container">
                <h2>Registered Users</h2>
                <div class="table-wrapper">
                    <table id="all-users-table">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Full Name</th>
                                <th>Role</th>
                                <th>Admin?</th>
                            </tr>
                        </thead>
                        <tbody id="all-users-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
